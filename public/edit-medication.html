<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Edit Medication</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="../css/dashboard.css">

</head>

<body class="bg-light">

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-9">

<div class="card shadow border-0 rounded-4">

<div class="card-header bg-warning">

<h3>

<i class="bi bi-pencil-square"></i>

Edit Medication

</h3>

</div>

<div class="card-body">

<form id="editForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>Name</label>

<input
class="form-control"
name="name"
id="name"
required>

</div>

<div class="col-md-6 mb-3">

<label>Dosage</label>

<input
class="form-control"
name="dosage"
id="dosage"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Frequency</label>

<select
class="form-select"
name="frequency"
id="frequency">

<option>Once Daily</option>

<option>Twice Daily</option>

<option>Three Times Daily</option>

<option>Weekly</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Reminder Time</label>

<input
type="time"
class="form-control"
id="time"
name="time">

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Start Date</label>

<input
type="date"
class="form-control"
id="startDate"
name="startDate">

</div>

<div class="col-md-6 mb-3">

<label>End Date</label>

<input
type="date"
class="form-control"
id="endDate"
name="endDate">

</div>

</div>

<div class="mb-3">

<label>Doctor's Instruction</label>

<textarea

class="form-control"

rows="4"

id="instruction"

name="instruction">

</textarea>

</div>

<div class="text-end">

<a

href="medications.html"

class="btn btn-secondary">

Cancel

</a>

<button

class="btn btn-warning"

type="submit">

Update Medication

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="edit-medication.js"></script>

</body>

</html>
