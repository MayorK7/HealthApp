<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account | Mobile Health App</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- SweetAlert2 -->

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>

        *{
            font-family:Poppins,sans-serif;
        }

        body{

            background:#eef5ff;

        }

        .left-side{

            min-height:100vh;
            background:linear-gradient(135deg,#0d6efd,#53a7ff);
            color:white;

            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;

            padding:60px;

        }

        .left-side img{

            width:80%;
            max-width:360px;

        }

        .left-side h1{

            font-weight:700;

            margin-top:25px;

        }

        .right-side{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:40px;

        }

        .card{

            width:100%;
            max-width:560px;

            border:none;

            border-radius:20px;

            box-shadow:0 15px 40px rgba(0,0,0,.08);

            padding:35px;

        }

        .form-control{

            height:52px;

            border-radius:12px;

        }

        .btn-register{

            height:54px;

            border-radius:12px;

            font-weight:600;

        }

        .logo{

            font-size:40px;

            color:#0d6efd;

        }

        .strength{

            height:8px;

            background:#ddd;

            border-radius:20px;

            overflow:hidden;

        }

        .strength div{

            height:100%;

            width:0;

            transition:.3s;

        }

        .password-icon{

            cursor:pointer;

        }

        @media(max-width:991px){

            .left-side{

                display:none;

            }

        }

    </style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- LEFT -->

<div class="col-lg-6 left-side">

<img src="Images/download health image.jfif"
     class="img-fluid">

<h1>

Join Mobile Health

</h1>

<p class="text-center mt-3">

Manage medications easily,

receive reminders,

track prescriptions

and stay healthier every day.

</p>

</div>

<!-- RIGHT -->

<div class="col-lg-6 right-side">

<div class="card">

<div class="text-center mb-4">

<i class="bi bi-heart-pulse-fill logo"></i>

<h2 class="fw-bold mt-3">

Create Account

</h2>

<p class="text-muted">

Register as a Patient

</p>

</div>

<form id="registerForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>

First Name

</label>

<input

type="text"

name="firstname"

id="firstname"

class="form-control"

required>

</div>

<div class="col-md-6 mb-3">

<label>

Last Name

</label>

<input

type="text"

name="lastname"

id="lastname"

class="form-control"

required>

</div>

</div>

<div class="mb-3">

<label>

Email Address

</label>

<input

type="email"

name="email"

id="email"

class="form-control"

required>

</div>

<div class="mb-3">

<label>

Phone Number

</label>

<input

type="tel"

name="phone"

id="phone"

class="form-control"

required>

</div>

<div class="mb-3">

<label>

Password

</label>

<div class="input-group">

<input

type="password"

name="password"

id="password"

class="form-control"

required>

<span

class="input-group-text password-icon">

<i

class="bi bi-eye"

id="togglePassword">

</i>

</span>

</div>

</div>

<div class="strength mb-2">

<div id="strengthBar"></div>

</div>

<small id="strengthText"

class="text-muted">

Password Strength

</small>

<div class="mb-3 mt-3">

<label>

Confirm Password

</label>

<div class="input-group">

<input

type="password"

id="confirmPassword"

class="form-control"

required>

<span

class="input-group-text password-icon">

<i

class="bi bi-eye"

id="toggleConfirm">

</i>

</span>

</div>

</div>

<div class="form-check mb-4">

<input

class="form-check-input"

type="checkbox"

id="terms"

required>

<label

class="form-check-label"

for="terms">

I agree to the Terms and Conditions

</label>

</div>

<button

class="btn btn-primary btn-register w-100"

type="submit">

<span class="btn-text">

Create Account

</span>

<span

class="spinner-border spinner-border-sm d-none"

id="spinner">

</span>

</button>

</form>

<hr>

<div class="text-center">

Already have an account?

<a href="login.html"

class="text-decoration-none fw-bold">

Login Here

</a>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="register.js"></script>
