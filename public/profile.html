<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        body{
            background:#f5f7fb;
        }

        .profile-card{
            max-width:900px;
            margin:40px auto;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,.1);
        }

        .profile-header{
            background:#0d6efd;
            color:white;
            padding:30px;
            text-align:center;
        }

        .profile-header h2{
            margin:0;
        }

        .profile-body{
            padding:30px;
        }

        .profile-item{
            margin-bottom:15px;
        }

        .label{
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="card profile-card">

    <div class="profile-header">

        <h2 id="fullname">Loading...</h2>

        <p id="email"></p>

    </div>

    <div class="profile-body">

        <div class="row">

            <div class="col-md-6 profile-item">
                <span class="label">Phone:</span>
                <p id="phone"></p>
            </div>

            <div class="col-md-6 profile-item">
                <span class="label">Gender:</span>
                <p id="gender"></p>
            </div>

            



            <!-- <div class="col-md-12 profile-item">
                <span class="label">Allergies:</span>
                <p id="allergies"></p>
            </div>

            <div class="col-md-12 profile-item">
                <span class="label">Medical Conditions:</span>
                <p id="conditions"></p>
            </div> -->

        </div>

        <div class="text-center">

    <img
        id="profilePreview"
        src="/images/default-avatar.png"
        class="rounded-circle"
        width="140"
        height="140">

    <br><br>

    <input
        type="file"
        id="profileImage"
        accept="image/*">

    <button
        class="btn btn-primary mt-3"
        id="uploadBtn">

        Upload Photo

    </button>

</div>







        <a href="dashboard.html" class="btn btn-primary mt-3">
            Back to Dashboard
        </a>

    </div>

</div>

<script src="profile.js"></script>

</body>
</html>
