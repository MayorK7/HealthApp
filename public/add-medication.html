<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Add Medication</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="dashboard.css">

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-9">

<div class="card shadow border-0 rounded-4">

<div class="card-header bg-primary text-white">

<h3>

<i class="bi bi-capsule"></i>

Add New Medication

</h3>

</div>

<div class="card-body">

<form id="medicationForm">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Medication Name

</label>

<input

type="text"

class="form-control"

name="name"

required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Dosage

</label>

<input

type="text"

class="form-control"

name="dosage"

placeholder="input the dosage prescribed"

required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Frequency

</label>

<select

class="form-select"

name="frequency"

required>

<option value="Once Daily">

Once Daily</option>

<option value="Twice Daily">

Twice Daily</option>

<option value="Three Times Daily">

Three Times Daily</option>

<!-- <option value="Every 6 Hours">

Every 6 Hours</option> -->

<!-- <option value="Every 8 Hours">Every 8 Hours</option> -->

<!-- <option value="Weekly"></option> -->

<!-- <option value="As Needed">As Needed</option> -->


</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Reminder Time

</label>

<input

type="time"

class="form-control"

name="time"

required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Start Date

</label>

<input

type="date"

class="form-control"

name="startDate"

required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

End Date

</label>

<input

type="date"

class="form-control"

name="endDate"

required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Doctor's Instruction

</label>

<textarea

class="form-control"

rows="4"

name="instruction"

placeholder="Take after meals..."></textarea>

</div>

<div class="text-end">

<a

href="dashboard.html"

class="btn btn-secondary">

Cancel

</a>

<button

type="submit"

class="btn btn-primary">

<i class="bi bi-save"></i>

Save Medication

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>


<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JavaScript -->
<script src="add-medication.js"></script>

</body>
</html>
