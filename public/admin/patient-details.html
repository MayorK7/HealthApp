<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patient Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
background:#f5f7fb;
font-family:Poppins,sans-serif;
}

.card{
border:none;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.avatar{

width:130px;

height:130px;

border-radius:50%;

object-fit:cover;

}

.stat{

border-radius:15px;

padding:20px;

text-align:center;

background:white;

box-shadow:0 5px 20px rgba(0,0,0,.08);

}

.table img{

width:45px;

}

</style>

</head>

<body>

<div class="container py-5">

<a href="admin-dashboard.html" class="btn btn-primary mb-4">

<i class="bi bi-arrow-left"></i>

Back

</a>

<div class="card p-4">

<div class="row">

<div class="col-md-3 text-center">

<img

id="profileImage"

src="../images/default-avatar.png"

class="avatar">

</div>

<div class="col-md-9">

<h2 id="patientName"></h2>

<p id="patientEmail"></p>

<p id="patientPhone"></p>

<p id="patientRole"></p>

<p id="joinedDate"></p>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-md-4">

<div class="stat">

<h3 id="totalMedications">0</h3>

<p>Total Medications</p>

</div>

</div>

<div class="col-md-4">

<div class="stat">

<h3 id="takenCount">0</h3>

<p>Taken</p>

</div>

</div>

<div class="col-md-4">

<div class="stat">

<h3 id="pendingCount">0</h3>

<p>Pending</p>

</div>

</div>

</div>

<div class="card mt-4 p-4">

<h3>

Medication List

</h3>

<div class="table-responsive">

<table class="table table-hover">

<thead class="table-primary">

<tr>

<th>Name</th>

<th>Dosage</th>

<th>Frequency</th>

<th>Time</th>

<th>Date Added</th>

<th>Status</th>

</tr>

</thead>

<tbody id="medicationTable">

</tbody>

</table>

</div>

</div>

</div>

<script src="patient-details.js"></script>

</body>

</html>
